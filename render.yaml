services:
  # ── Backend: FastAPI ──────────────────────────────────────────
  - type: web
    name: contech-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # מוגדר ידנית ב-Render dashboard
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false          # נתיב לקובץ credentials (אם נדרש)
      - key: DATABASE_URL
        sync: false          # Postgres connection string — מוגדר ידנית ב-Render dashboard
    healthCheckPath: /health

  # ── Frontend: React (Static Site) ────────────────────────────
  - type: web
    name: contech-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # URL של ה-backend למעלה
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
